<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑b李果 - 个人博客</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#home" class="nav-logo">黑b李果</a>
            <ul class="nav-menu">
                <li><a href="#home" class="nav-link active">首页</a></li>
                <li><a href="#about" class="nav-link">关于我</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Hero 首屏 -->
    <section id="home" class="hero">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="avatar-wrapper">
                <img src="https://aka.doubaocdn.com/s/52ib1wkXBL" alt="头像" class="avatar">
            </div>
            <h1 class="hero-title">你好，我是 <span class="text-primary">黑b李果</span></h1>
            <p class="hero-subtitle">热爱卖身，也热扣13</p>
            <div class="hero-buttons">
                <a href="#about" class="btn btn-primary">了解更多</a>
                <a href="mailto:9178@example.com" class="btn btn-outline">联系我</a>
            </div>
            <div class="scroll-indicator">
                <span></span>
            </div>
        </div>
    </section>

    <!-- 关于我 -->
    <section id="about" class="about">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">关于我</h2>
                <p class="section-subtitle">一个简单的自我介绍</p>
            </div>
            <div class="about-content">
                <div class="about-image">
                    <img src="https://aka.doubaocdn.com/s/d19Z1wkXBL" alt="关于我">
                </div>
                <div class="about-info">
                    <h3 class="about-name">黑b李果</h3>
                    <div class="info-cards">
                        <div class="info-card">
                            <div class="info-icon">📍</div>
                            <div class="info-text">
                                <span class="info-label">城市</span>
                                <span class="info-value">日本</span>
                            </div>
                        </div>
                        <div class="info-card">
                            <div class="info-icon">✉️</div>
                            <div class="info-text">
                                <span class="info-label">邮箱</span>
                                <span class="info-value">9178@example.com</span>
                            </div>
                        </div>
                        <div class="info-card">
                            <div class="info-icon">⏱️</div>
                            <div class="info-text">
                                <span class="info-label">经验</span>
                                <span class="info-value">18年+ 卖身经验</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <h3>黑b李果</h3>
                    <p>个人博客 · 记录生活</p>
                </div>
                <div class="footer-links">
                    <h4>快速导航</h4>
                    <ul>
                        <li><a href="#home">首页</a></li>
                        <li><a href="#about">关于我</a></li>
                    </ul>
                </div>
                <div class="footer-contact">
                    <h4>联系方式</h4>
                    <p>📧 9178@example.com</p>
                    <p>📍 日本</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 黑b李果. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- 回到顶部 -->
    <button class="back-to-top" id="backToTop" title="回到顶部">↑</button>

    <script src="script.js"></script>
</body>
</html>
